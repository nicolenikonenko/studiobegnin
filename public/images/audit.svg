<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="1450" viewBox="0 0 3200 1450">
  <defs>
    <style>
      .sans { font-family: Inter, Helvetica, Arial, sans-serif; }
      .serif { font-family: Georgia, 'Times New Roman', serif; }
      .smallcaps { font-family: Inter, Helvetica, Arial, sans-serif; letter-spacing: 5px; }
      .muted { fill: #77756F; }
      .text { fill: #111111; }
      .line { stroke: #B8B5AD; stroke-width: 2; opacity: .65; }
      .thin { stroke: #B8B5AD; stroke-width: 1.4; opacity: .5; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#111111" flood-opacity="0.12"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#111111" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="foldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#DCD8CF" stop-opacity=".28"/>
      <stop offset=".45" stop-color="#F9F8F4" stop-opacity=".15"/>
      <stop offset="1" stop-color="#D0CCC3" stop-opacity=".35"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#F6F3EE"/>
  <rect x="0" y="1160" width="3200" height="290" fill="#E7E4DE" opacity=".33"/>

  <rect x="345" y="177" width="1250" height="935" rx="4" fill="#EDEAE3" filter="url(#softShadow)" opacity=".8"/>
